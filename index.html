<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 投資大師雷達</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> ::-webkit-scrollbar { display: none; } </style>
</head>
<body class="bg-[#0f172a] text-slate-200 h-screen flex flex-col font-sans">

    <div id="tab-screener" class="page-content hidden space-y-4 p-4">
        <div class="bg-[#1e293b] p-5 rounded-2xl border border-slate-700/50 shadow-lg">
            <h3 class="text-lg font-bold text-white flex items-center gap-2">
                <span>🎩</span> 大師選股篩選器
            </h3>
            <p class="text-xs text-slate-400 mt-2">點擊下方市場，AI 將自動掃描藍籌股，尋找符合巴菲特與林奇邏輯的標的。</p>
            
            <div class="grid grid-cols-2 gap-3 mt-6">
                <button onclick="runScreener('TW')" class="bg-[#166534] py-3 rounded-xl font-bold border border-green-700">掃描台股 50 強</button>
                <button onclick="runScreener('US')" class="bg-[#1e40af] py-3 rounded-xl font-bold border border-blue-700 text-blue-100">掃描美股科技巨頭</button>
            </div>
        </div>

        <div id="screenerProgress" class="hidden bg-indigo-900/30 p-4 rounded-xl text-center text-sm border border-indigo-500/30 animate-pulse">
            🔍 AI 正在面試：<span id="currentScanning"></span> ...
        </div>

        <div id="screenerResults" class="grid grid-cols-1 gap-4">
            </div>
    </div>

    <script>
        const BACKEND_URL = "https://my-ai-finance.onrender.com";

        // === 🎩 大師篩選邏輯 ===
        const SEED_LISTS = {
            'TW': ['2330.TW', '2317.TW', '2454.TW', '2308.TW', '2881.TW', '2882.TW', '2382.TW', '2357.TW', '2412.TW', '1301.TW'],
            'US': ['AAPL', 'NVDA', 'MSFT', 'GOOGL', 'AMZN', 'META', 'TSLA', 'AVGO', 'COST', 'NFLX']
        };

        async function runScreener(market) {
            const tickers = SEED_LISTS[market];
            const resultsContainer = document.getElementById('screenerResults');
            const progress = document.getElementById('screenerProgress');
            const currentSpan = document.getElementById('currentScanning');

            resultsContainer.innerHTML = '';
            progress.classList.remove('hidden');

            for (const ticker of tickers) {
                currentSpan.innerText = ticker;
                try {
                    const res = await fetch(`${BACKEND_URL}/analyze/${ticker}`);
                    const data = await res.json();

                    if (!data.error && data.fundamentals.tags.length > 0) {
                        resultsContainer.innerHTML += `
                            <div class="bg-[#1e293b] p-4 rounded-xl border-l-4 border-yellow-500 shadow-md">
                                <div class="flex justify-between items-center mb-2">
                                    <h4 class="font-bold text-white text-lg">${data.stock}</h4>
                                    <span class="text-xs text-slate-400">ROE: ${data.fundamentals.roe}</span>
                                </div>
                                <div class="flex flex-wrap gap-2 mb-3">
                                    ${data.fundamentals.tags.map(tag => `<span class="bg-indigo-900/50 text-indigo-300 text-[10px] px-2 py-0.5 rounded border border-indigo-700">${tag}</span>`).join('')}
                                </div>
                                <p class="text-sm font-bold text-green-400">${data.final_signal}</p>
                            </div>
                        `;
                    }
                } catch (e) { console.error(e); }
                // 保護伺服器，每檔休息 2 秒
                await new Promise(r => setTimeout(r, 2000));
            }

            if (resultsContainer.innerHTML === '') {
                resultsContainer.innerHTML = '<div class="text-center text-slate-500 py-10">目前暫無符合大師嚴選條件的標的。</div>';
            }
            progress.classList.add('hidden');
        }

        // ... (原本的分頁切換、持倉計算、退休邏輯請務必保留) ...
        function switchTab(tabId, title, subtitle) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-blue-500'); btn.classList.add('text-slate-500');
            });
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.querySelector(`[data-target="tab-${tabId}"]`).classList.remove('text-slate-500');
            document.querySelector(`[data-target="tab-${tabId}"]`).classList.add('text-blue-500');
            document.getElementById('pageTitle').innerText = title;
            document.getElementById('pageSubtitle').innerText = subtitle;
        }
    </script>
</body>
</html>
